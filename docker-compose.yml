version: '3.8'

services:
  mongodb:
    image: mongo:5
    container_name: doctor-appointment-mongodb
    environment:
      MONGO_INITDB_DATABASE: doctor-appointments
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: doctor-appointment-backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/doctor-appointments
      JWT_SECRET: your_jwt_secret_key
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: doctor-appointment-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  mongo_data:

networks:
  default:
    name: doctor-appointment-network
